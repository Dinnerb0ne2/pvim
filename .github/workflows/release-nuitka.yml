name: release-nuitka

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, e.g. v0.9.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows-x64
          - os: ubuntu-latest
            artifact_suffix: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.14.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install Nuitka
        run: python -m pip install --upgrade pip nuitka

      - name: Build standalone binary
        shell: pwsh
        run: >
          python -m nuitka --standalone --assume-yes-for-downloads --remove-output --output-dir=build
          --include-data-file=pvim.config.json=pvim.config.json
          --include-data-file=pvim.theme.default.json=pvim.theme.default.json
          --include-data-file=autopairs.json=autopairs.json
          --include-data-dir=syntax=syntax
          --include-data-dir=themes=themes
          pvim.py

      - name: Archive build output
        shell: pwsh
        env:
          SUFFIX: ${{ matrix.artifact_suffix }}
        run: |
          $script = @'
          import os
          import pathlib
          import shutil
          import zipfile

          suffix = os.environ["SUFFIX"]
          dist = pathlib.Path("build") / "pvim.dist"
          release_dir = pathlib.Path("build") / f"pvim-{suffix}"
          archive = pathlib.Path("build") / f"pvim-{suffix}.zip"

          if not dist.exists():
              raise SystemExit("Missing build/pvim.dist")

          shutil.rmtree(release_dir, ignore_errors=True)
          shutil.copytree(dist, release_dir)

          for name in ("README.md", "LICENSE"):
              source = pathlib.Path(name)
              if source.exists():
                  shutil.copy2(source, release_dir / name)

          archive.unlink(missing_ok=True)
          with zipfile.ZipFile(archive, "w", zipfile.ZIP_DEFLATED) as zf:
              for path in release_dir.rglob("*"):
                  zf.write(path, path.relative_to(release_dir.parent))

          print(f"Created {archive}")
          '@
          python -c $script

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvim-${{ matrix.artifact_suffix }}
          path: build/pvim-${{ matrix.artifact_suffix }}.zip
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pvim-*
          merge-multiple: true
          path: release-assets

      - name: Create or update release
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "release tag is empty" >&2
            exit 1
          fi
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "PVIM $RELEASE_TAG" \
              --notes "Automated Nuitka standalone build (Python 3.14.3)."
          fi
          gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber