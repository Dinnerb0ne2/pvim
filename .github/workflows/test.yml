name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.14.3
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"
      - name: Run tests
        run: python -m tests.run_tests
